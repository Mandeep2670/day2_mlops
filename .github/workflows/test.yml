name: MLOPs day 2 CI

on:
  push:
    branches:
      -main

jobs:
  run-training:
    runs-on: ubuntu-latest

    steps:
      -name: Fetch Code
       uses: actions/checkout@v4

      -name: Setup Python 
       uses: actions/setup-python@v5
       with:
         python-version: '3.10'

      -name:  Install Dependencies 
       run: pip install -r requirement.txt     

      -name: Run Training Script 
       run: python train.py
